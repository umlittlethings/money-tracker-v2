name: Node.js CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  release:
    types: [published] # Trigger khusus saat kamu membuat release baru di GitHub

jobs:
  # JOB 1: TESTING (Jalan tiap kali ada push/PR)
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]
        
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - run: npm ci
      - run: npm test

  # JOB 2: PUBLISH KE NPM (Hanya jalan saat Release dan kalau Job 1 sukses)
  publish-npm:
    needs: build-and-test # Tunggu testing selesai dan sukses dulu
    runs-on: ubuntu-latest
    if: github.event_name == 'release' # Pastikan cuma jalan pas di-release
    
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org/'
      
      - run: npm ci
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }} # Butuh token rahasia dari NPM
